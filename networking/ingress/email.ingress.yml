apiVersion: v1
kind: Namespace
metadata:
  name: email
---
# Service → VM on 443 (Stalwart's own HTTPS listener, serving its own cert)
apiVersion: v1
kind: Service
metadata:
  name: stalwart-mail-tls
  namespace: email
spec:
  ports:
    - name: https
      port: 443
      targetPort: 443
---
apiVersion: v1
kind: Endpoints
metadata:
  name: stalwart-mail-tls
  namespace: email
subsets:
  - addresses:
      - ip: 10.1.1.18
    ports:
      - name: https
        port: 443
---
# TLS passthrough: Traefik forwards the encrypted stream untouched
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: stalwart-mail-tls
  namespace: email
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`mail.hospitalsm.net`)
      services:
        - name: stalwart-mail-tls
          port: 443
  tls:
    passthrough: true